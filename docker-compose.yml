services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DB_PATH=/app/pa.db
      - FRONTEND_URL=http://localhost:3000
      - OLLAMA_BASE_URL=http://host.containers.internal:11434
      - TZ=Asia/Singapore
    extra_hosts:
      - "host.containers.internal:host-gateway"
    volumes:
      - ./backend/pa.db:/app/pa.db:Z
      - ./backend/chroma_data:/app/chroma_data:Z
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
